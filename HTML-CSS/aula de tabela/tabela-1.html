<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        table{
            background-color: beige;
            border-collapse: collapse;
        }
        th, td{
            width: 100px;
            height: 40px;
            padding: 10px;
        }
        th{
            height: 20px;
            border: 2px solid black;
            background-color: gainsboro;
        }
        td{
            border: 1px solid black;
        }
        #tbmesclagem{
            margin: 0 10px;
            text-align: center;
        }
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tabela simples</h1>
    <table style="display: inline-block;">
        <caption><h2>TABELA SIMPLES</h2></caption>
        <tr>
            <th>NÚMERO</th>
            <th>NOME</th>
            <th>CPF</th>
        </tr>
        <tr>
            <td>2199512</td>
            <td>almeida</td>
            <td>150944</td>
        </tr>
        <tr>
            <td>219856</td>
            <td>menina</td>
            <td>20673</td>
        </tr>
        <tr>
            <td>229965</td>
            <td>alenina</td>
            <td>26034</td>
        </tr>
        <tr>
            <td>228547</td>
            <td>josevaldo</td>
            <td>15026</td>
        </tr>
        <tr>
            <td>452369</td>
            <td>jojo</td>
            <td>12056</td>
        </tr>
    </table>
    <table id="tbmesclagem" style="display: inline-block;">
        <caption><h2>TABELA MESCLADA</h2></caption>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
        </tr>
        <tr>
            <td rowspan="3">D</td>
            <td>F</td>
            <td>E</td>
        </tr>
        <tr>
            <td>H</td>
            <td rowspan="2">I</td>
        </tr>
        <tr>
            <td>K</td>
        </tr>
        <tr>
            <td>a</td>
            <td>a</td>
            <td>a</td>
        </tr>
    </table>
    <a href="tabela-2.html"style="display: block;">proxima tabela</a>
</body>
</html>
